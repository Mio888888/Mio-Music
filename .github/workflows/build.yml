name: Build

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.check.outputs.changed }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Check version change
        id: check
        run: |
          VERSION=$(jq -r '.version' src-tauri/tauri.conf.json)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

          TAG="v${VERSION}"
          if git tag -l "$TAG" | grep -q .; then
            echo "Tag $TAG already exists, skipping build"
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "Tag $TAG not found, will build"
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

  build-windows:
    needs: check-version
    if: needs.check-version.outputs.should_build == 'true'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: yarn install

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: v__VERSION__
          releaseName: 'Mio Music v__VERSION__'
          releaseBody: 'See the assets to download this version.'
          releaseDraft: true
          prerelease: false

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v5
        with:
          name: mio-windows
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe

  build-macos:
    needs: check-version
    if: needs.check-version.outputs.should_build == 'true'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: yarn install

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: v__VERSION__
          releaseName: 'Mio Music v__VERSION__'
          releaseBody: 'See the assets to download this version.'
          releaseDraft: true
          prerelease: false

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v5
        with:
          name: mio-macos
          path: |
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/macos/*.app.tar.gz*

  build-linux:
    needs: check-version
    if: needs.check-version.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libasound2-dev

      - name: Install frontend dependencies
        run: yarn install

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: v__VERSION__
          releaseName: 'Mio Music v__VERSION__'
          releaseBody: 'See the assets to download this version.'
          releaseDraft: true
          prerelease: false

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v5
        with:
          name: mio-linux
          path: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/appimage/*.AppImage.*

  build-android:
    needs: check-version
    if: needs.check-version.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,x86_64-linux-android

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: |
          LATEST_NDK=$(ls -d "$ANDROID_HOME/ndk/"* 2>/dev/null | sort -V | tail -1)
          if [ -z "$LATEST_NDK" ]; then
            sdkmanager "ndk;27.0.12077973"
            LATEST_NDK="$ANDROID_HOME/ndk/27.0.12077973"
          fi
          echo "NDK_HOME=$LATEST_NDK" >> $GITHUB_ENV
          echo "ANDROID_NDK_HOME=$LATEST_NDK" >> $GITHUB_ENV
          echo "Using NDK: $LATEST_NDK"

      - name: Install frontend dependencies
        run: yarn install

      - name: Initialize Android project
        run: npx tauri android init

      - name: Add Android permissions
        run: |
          MANIFEST="src-tauri/gen/android/app/src/main/AndroidManifest.xml"
          if [ ! -f "$MANIFEST" ]; then
            echo "::error::AndroidManifest.xml not found"
            exit 1
          fi
          python3 <<'PY'
          from pathlib import Path
          manifest = Path("src-tauri/gen/android/app/src/main/AndroidManifest.xml")
          text = manifest.read_text()
          permissions = [
              "android.permission.INTERNET",
              "android.permission.READ_EXTERNAL_STORAGE",
              "android.permission.WRITE_EXTERNAL_STORAGE",
              "android.permission.READ_MEDIA_AUDIO",
              "android.permission.FOREGROUND_SERVICE",
              "android.permission.WAKE_LOCK",
              "android.permission.MODIFY_AUDIO_SETTINGS",
              "android.permission.RECORD_AUDIO",
          ]
          for perm in permissions:
              if perm not in text:
                  text = text.replace(
                      "</manifest>",
                      f'    <uses-permission android:name="{perm}" />\n</manifest>',
                  )
          manifest.write_text(text)
          print(f"Patched {manifest} with permissions")
          for line in text.splitlines():
              if "uses-permission" in line:
                  print(line.strip())
          PY

      - name: Debug Android config
        run: |
          echo "=== AndroidManifest.xml ==="
          cat src-tauri/gen/android/app/src/main/AndroidManifest.xml
          echo ""
          echo "=== build.gradle.kts (first 80 lines) ==="
          head -80 src-tauri/gen/android/app/build.gradle.kts
          echo ""
          echo "=== gradle.properties ==="
          cat -A src-tauri/gen/android/gradle.properties

      - name: Configure Android release signing
        shell: bash
        env:
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_KEY_BASE64: ${{ secrets.ANDROID_KEY_BASE64 }}
        run: |
          set -euo pipefail

          for name in ANDROID_KEY_ALIAS ANDROID_KEY_PASSWORD ANDROID_KEY_BASE64; do
            if [ -z "${!name:-}" ]; then
              echo "::error::${name} secret is required for signed Android releases"
              exit 1
            fi
          done

          ANDROID_PROJECT_DIR="src-tauri/gen/android"
          KEYSTORE_PATH="$RUNNER_TEMP/keystore.jks"

          printf '%s' "$ANDROID_KEY_BASE64" | base64 --decode > "$KEYSTORE_PATH"
          chmod 600 "$KEYSTORE_PATH"

          {
            printf '%s\n' "keyAlias=${ANDROID_KEY_ALIAS}"
            printf '%s\n' "password=${ANDROID_KEY_PASSWORD}"
            printf '%s\n' "storeFile=${KEYSTORE_PATH}"
          } > "$ANDROID_PROJECT_DIR/keystore.properties"
          chmod 600 "$ANDROID_PROJECT_DIR/keystore.properties"

          python3 <<'PY'
          from pathlib import Path

          gradle_file = Path("src-tauri/gen/android/app/build.gradle.kts")
          text = gradle_file.read_text()

          if "import java.io.FileInputStream" not in text:
              if "import java.util.Properties" in text:
                  text = text.replace(
                      "import java.util.Properties\n",
                      "import java.io.FileInputStream\nimport java.util.Properties\n",
                      1,
                  )
              else:
                  text = "import java.io.FileInputStream\nimport java.util.Properties\n" + text

          keystore_marker = 'val keystorePropertiesFile = rootProject.file("keystore.properties")'
          if keystore_marker not in text:
              android_marker = "\nandroid {"
              if android_marker not in text:
                  raise SystemExit("Unable to find android block in generated build.gradle.kts")
              keystore_block = (
                  'val keystorePropertiesFile = rootProject.file("keystore.properties")\n'
                  "val keystoreProperties = Properties().apply {\n"
                  "    FileInputStream(keystorePropertiesFile).use { load(it) }\n"
                  "}\n\n"
              )
              text = text.replace(android_marker, "\n" + keystore_block + "android {", 1)

          signing_marker = 'keyAlias = keystoreProperties["keyAlias"] as String'
          if signing_marker not in text:
              lines = text.splitlines(keepends=True)
              for index, line in enumerate(lines):
                  if line.strip() == "buildTypes {":
                      indent = line[: len(line) - len(line.lstrip())]
                      signing_block = [
                          f"{indent}signingConfigs {{\n",
                          f'{indent}    create("release") {{\n',
                          f'{indent}        keyAlias = keystoreProperties["keyAlias"] as String\n',
                          f'{indent}        keyPassword = keystoreProperties["password"] as String\n',
                          f'{indent}        storeFile = file(keystoreProperties["storeFile"] as String)\n',
                          f'{indent}        storePassword = keystoreProperties["password"] as String\n',
                          f"{indent}    }}\n",
                          f"{indent}}}\n",
                          "\n",
                      ]
                      lines[index:index] = signing_block
                      text = "".join(lines)
                      break
              else:
                  raise SystemExit("Unable to find buildTypes block in generated build.gradle.kts")

          release_signing_marker = 'signingConfig = signingConfigs.getByName("release")'
          if release_signing_marker not in text:
              lines = text.splitlines(keepends=True)
              for index, line in enumerate(lines):
                  if 'getByName("release")' in line and line.strip().endswith("{"):
                      indent = line[: len(line) - len(line.lstrip())] + "    "
                      lines.insert(index + 1, f"{indent}{release_signing_marker}\n")
                      text = "".join(lines)
                      break
              else:
                  raise SystemExit("Unable to find release build type in generated build.gradle.kts")

          abi_marker = "// Mio Music ABI split override"
          if abi_marker not in text:
              abi_block = '''

// Mio Music ABI split override
android {
    defaultConfig {
        ndk {
            abiFilters.clear()
            abiFilters += listOf("arm64-v8a", "x86_64")
        }
    }

    splits {
        abi {
            isEnable = true
            reset()
            include("arm64-v8a", "x86_64")
            isUniversalApk = true
        }
    }
}
'''
              text = text.rstrip() + abi_block

          gradle_file.write_text(text)
          print(f"Patched {gradle_file} for release signing + ABI splits")
          PY

      - name: Build signed Android APK
        id: tauri_build
        continue-on-error: true
        run: npx tauri android build --apk --ci

      - name: Debug Gradle error
        if: steps.tauri_build.outcome == 'failure'
        run: |
          cd src-tauri/gen/android
          chmod +x gradlew
          ./gradlew assembleRelease --stacktrace 2>&1 || true

      - name: Fail if build failed
        if: steps.tauri_build.outcome == 'failure'
        run: exit 1

      - name: Verify signed Android APKs
        shell: bash
        run: |
          set -euo pipefail

          APKSIGNER="$(find "$ANDROID_HOME/build-tools" -type f -name apksigner | sort -V | tail -n 1)"
          if [ -z "$APKSIGNER" ]; then
            echo "::error::apksigner not found in Android SDK build-tools"
            exit 1
          fi

          rm -rf android-signed-apks
          mkdir -p android-signed-apks

          verified_count=0
          while IFS= read -r -d '' apk; do
            relative_path="${apk#src-tauri/gen/android/app/build/outputs/apk/}"
            case "$relative_path" in
              *release*.apk|*/release/*.apk) ;;
              *)
                echo "Skipping non-release APK: $apk"
                continue
                ;;
            esac

            echo "Verifying signed release APK: $apk"
            "$APKSIGNER" verify -v --print-certs "$apk"

            destination="android-signed-apks/$relative_path"
            mkdir -p "$(dirname "$destination")"
            cp "$apk" "$destination"
            verified_count=$((verified_count + 1))
          done < <(find src-tauri/gen/android/app/build/outputs/apk -type f -name "*.apk" ! -name "*unsigned*" ! -name "*debug*" ! -path "*/debug/*" -print0 | sort -z)

          if [ "$verified_count" -eq 0 ]; then
            echo "::error::No verified signed release APKs were found"
            exit 1
          fi

      - name: Upload APK to release
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          TAG="v${{ needs.check-version.outputs.version }}"
          while IFS= read -r -d '' apk; do
            echo "Uploading $apk to release $TAG"
            for i in $(seq 1 20); do
              if gh release upload "$TAG" "$apk" --clobber; then
                break
              fi
              if [ "$i" -eq 20 ]; then
                echo "::error::Failed to upload $apk to release $TAG"
                exit 1
              fi
              echo "Retrying in 30s... ($i/20)"
              sleep 30
            done
          done < <(find android-signed-apks -type f -name "*.apk" -print0 | sort -z)

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v5
        with:
          name: mio-android
          path: |
            android-signed-apks/**/*.apk

  publish-release:
    needs: [check-version, build-windows, build-macos, build-linux]
    if: needs.check-version.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Publish release
        uses: actions/github-script@v8
        with:
          script: |
            const version = '${{ needs.check-version.outputs.version }}'
            const tag = `v${version}`
            const { owner, repo } = context.repo
            const releases = await github.paginate(github.rest.repos.listReleases, { owner, repo, per_page: 100 })
            const release = releases.find((item) => item.tag_name === tag)
            if (!release) {
              core.setFailed(`Release ${tag} was not created`)
              return
            }
            await github.rest.repos.updateRelease({
              owner,
              repo,
              release_id: release.id,
              draft: false,
              prerelease: false,
            })
